<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 助手 · 阿昕的作品</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #a855f7;
            --primary-light: #c084fc;
            --secondary: #ec4899;
            --gradient: linear-gradient(135deg, #a855f7, #ec4899);
            --bg: #000000;
            --bg-surface: rgba(255,255,255,0.04);
            --bg-surface-hover: rgba(255,255,255,0.08);
            --text: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.45);
            --border: rgba(255,255,255,0.06);
            --radius: 16px;
            --transition: 0.4s cubic-bezier(0.22,1,0.36,1);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }
        .glow {
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(120px);
            opacity: 0.2;
        }
        .glow-1 { top: -150px; right: -150px; background: #a855f7; }
        .glow-2 { bottom: -200px; left: -150px; background: #ec4899; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
        .back-bar { padding: 28px 0; border-bottom: 1px solid var(--border); margin-bottom: 48px; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); text-decoration: none; font-size: 0.95rem; transition: color var(--transition); }
        .back-btn:hover { color: var(--primary-light); }
        .project-header { text-align: center; margin-bottom: 48px; }
        .project-header .icon { font-size: 4rem; margin-bottom: 20px; }
        .project-header h1 { font-size: 2.8rem; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.02em; background: linear-gradient(135deg, #fff 40%, var(--primary-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .project-header .subtitle { color: var(--text-secondary); font-size: 1.1rem; }
        .project-tags { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; margin: 28px 0 48px; }
        .project-tags span { background: rgba(168,85,247,0.1); color: var(--primary-light); padding: 6px 20px; border-radius: 100px; font-size: 0.85rem; font-weight: 450; border: 1px solid rgba(168,85,247,0.1); }
        .project-content h2 { font-size: 1.5rem; margin: 40px 0 16px; color: var(--text); font-weight: 600; }
        .project-content h2::before { content: '▎'; color: var(--primary); }
        .project-content p { color: var(--text-secondary); margin-bottom: 16px; font-size: 1.05rem; }
        .project-content ul { list-style: none; padding: 0; margin-bottom: 24px; }
        .project-content ul li { color: var(--text-secondary); padding: 12px 20px; margin-bottom: 8px; background: var(--bg-surface); border-radius: 12px; border: 1px solid var(--border); backdrop-filter: blur(12px); }
        .project-content ul li::before { content: '✨ '; }
        .screenshot { width: 100%; height: 360px; background: linear-gradient(135deg, rgba(168,85,247,0.06), rgba(236,73,153,0.06)); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--text-muted); margin: 28px 0; border: 1px solid var(--border); }
        footer { text-align: center; padding: 48px 0; border-top: 1px solid var(--border); color: var(--text-dim, rgba(255,255,255,0.25)); font-size: 0.85rem; margin-top: 60px; }
        @media (max-width: 600px) {
            .project-header h1 { font-size: 1.8rem; }
            .project-content h2 { font-size: 1.3rem; }
            .screenshot { height: 220px; }
        }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="container">
        <div class="back-bar">
            <a href="index.html" class="back-btn">← 返回主页</a>
        </div>
        <div class="project-header">
            <div class="icon">🤖</div>
            <h1>AI 助手应用</h1>
            <p class="subtitle">智能对话与内容生成工具</p>
            <div class="project-tags">
                <span>Python</span>
                <span>FastAPI</span>
                <span>LLM</span>
            </div>
        </div>
        <div class="screenshot">📷 项目截图预览</div>
        <div class="project-content">
            <h2>项目简介</h2>
            <p>集成大语言模型的智能助手，支持自然对话、文档分析、代码生成等多种功能。</p>
            <h2>核心功能</h2>
            <ul>
                <li>智能对话与上下文记忆</li>
                <li>文档内容分析与总结</li>
                <li>多语言代码生成</li>
                <li>Markdown 实时渲染</li>
                <li>对话历史导出</li>
            </ul>
            <h2>技术架构</h2>
            <p>后端使用 Python FastAPI 构建 API 服务，前端采用响应式设计。
            集成主流大语言模型，支持流式输出，实现打字机效果的实时回复。</p>
        </div>
    </div>
    <footer>
        <div class="container">
            <p>&copy; 2026 阿昕 · Made with ❤️</p>
            <p style="margin-top: 8px;"><a href="index.html" style="color: var(--primary-light);">← 返回主页</a></p>
        </div>
    </footer>
</body>
</html>
